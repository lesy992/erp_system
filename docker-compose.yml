version: '3.8'

services:
  # ==========================================
  # Database 인프라 영역
  # ==========================================
  auth-db:
    image: mysql:8.0
    container_name: auth-db
    restart: always
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${AUTH_DB_PORT}:3306" # 로컬 호스트 포트:컨테이너 포트
    networks:
      - erp-network
    volumes:
      - auth-db-data:/var/lib/mysql # 데이터 영속성 보장

  biz-db:
    image: mysql:8.0
    container_name: biz-db
    restart: always
    environment:
      MYSQL_DATABASE: ${BIZ_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${BIZ_DB_PORT}:3306"
    networks:
      - erp-network
    volumes:
      - biz-db-data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - erp-network


