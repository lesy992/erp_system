  #     - DB_HOST=auth-db # Docker 내부 네트워크에서 컨테이너명으로 접근
  #     - DB_PORT=3306    # 컨테이너 내부 맵핑 포트
  #     - DB_NAME=${AUTH_DB_NAME}
